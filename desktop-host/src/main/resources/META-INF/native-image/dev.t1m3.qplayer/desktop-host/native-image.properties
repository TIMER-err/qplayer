# qplayer desktop native-image build args (auto-applied when this jar is on the
# native-image classpath). The AOT-compiled QML classes + interpreted Rhino mean
# no runtime class generation; URL protocols + sound init-at-runtime + the LWJGL/
# Skija JNI metadata complete the closed-world picture.
# Encoding: native-image bakes file.encoding / sun.jnu.encoding / native.encoding
# from the BUILD host. On the English Windows CI runner that's Cp1252, so on a
# Chinese Windows the UTF-8 NetEase JSON gets decoded as Cp1252 → mojibake (不要说话
# → 涓嶈璇磋瘽). Force UTF-8 as the runtime default (Linux/macOS are UTF-8 already,
# no-op there) and include every charset so any GBK/Cp1252 path still decodes
# instead of throwing.
Args = --no-fallback \
       --enable-url-protocols=https,http \
       -Dqplayer.aot=true \
       -Dqml4j.rhino.opt=-1 \
       -J-Dfile.encoding=UTF-8 \
       -J-Dsun.jnu.encoding=UTF-8 \
       -Dfile.encoding=UTF-8 \
       -Dsun.jnu.encoding=UTF-8 \
       -Dnative.encoding=UTF-8 \
       -H:+AddAllCharsets \
       --initialize-at-run-time=org.lwjgl,io.github.humbleui.skija,org.mozilla.javascript,com.sun.media.sound,java.awt,sun.awt,javax.swing,sun.swing,sun.font,sun.java2d,javax.imageio,com.sun.imageio,com.formdev.flatlaf \
       -H:+ReportExceptionStackTraces

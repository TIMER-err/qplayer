# qplayer desktop native-image build args (auto-applied when this jar is on the
# native-image classpath). The AOT-compiled QML classes + interpreted Rhino mean
# no runtime class generation; URL protocols + sound init-at-runtime + the LWJGL/
# Skija JNI metadata complete the closed-world picture.
Args = --no-fallback \
       --enable-url-protocols=https,http \
       -Dqplayer.aot=true \
       -Dqml4j.rhino.opt=-1 \
       --initialize-at-run-time=org.lwjgl,io.github.humbleui.skija,org.mozilla.javascript,com.sun.media.sound,com.sun.jna,dorkbox \
       -H:+ReportExceptionStackTraces

name: Build & attach APK

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write   # upload release assets

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - uses: gradle/actions/setup-gradle@v4

      # player-core is an in-repo SNAPSHOT the app depends on; install it (and its parent
      # pom, which Gradle also resolves) to the local repo. qml4j-core comes from Maven
      # Central; md3.Core + fonts are vendored. Install the parent non-recursively first
      # so we don't also build the desktop-host module.
      - name: Install player-core (Maven Local)
        run: |
          mvn -q -B -N install
          mvn -q -B -DskipTests install -f player-core/pom.xml

      - name: Build APK
        run: |
          chmod +x android-shell/gradlew
          cd android-shell && ./gradlew --no-daemon :app:assembleDebug

      - name: Stage APK
        run: |
          mkdir -p out
          cp android-shell/app/build/outputs/apk/debug/app-debug.apk \
             "out/qplayer-${{ github.ref_name }}.apk"

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: out/qplayer-*.apk

      - name: Upload as artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: qplayer-apk
          path: out/qplayer-*.apk

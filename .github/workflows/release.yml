name: Release

# One unified release pipeline. It builds, in parallel:
#   • android  — the signed release APK
#   • desktop  — the GraalVM native-image app on Linux / Windows / macOS
#                (intel + apple-silicon); native-image can't cross-compile, so
#                each platform builds on its own runner.
# Every job attaches its artifact(s) to the GitHub Release for the tag
# (action-gh-release creates the release on first upload and appends after).
#
# Triggers on BOTH ways of cutting a release, so either works:
#   • `git push` of a `v*` tag           → push event
#   • "Publish release" in the GitHub UI → release:published event
# (a UI-created release does not reliably emit a tag push event, so we need both).
# A manual `workflow_dispatch` run skips the release and uploads artifacts only.

on:
  push:
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch: {}

# Push-a-tag and publish-a-release can both fire for the same version; collapse
# them into one run per ref instead of building everything twice.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    env:
      QPLAYER_STORE_PASSWORD: ${{ secrets.QPLAYER_STORE_PASSWORD }}
      QPLAYER_KEY_ALIAS: ${{ secrets.QPLAYER_KEY_ALIAS }}
      QPLAYER_KEY_PASSWORD: ${{ secrets.QPLAYER_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Explicit Maven cache (the qml4j source build + player-core install + their
      # deps land in ~/.m2). setup-gradle below handles the Gradle caches itself.
      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - uses: gradle/actions/setup-gradle@v4

      # qml4j-core is normally pulled from Maven Central, but a freshly-tagged
      # engine may not be published yet (Central monthly publish quota). Build the
      # matching tag from source into the local Maven repo; gradle's mavenLocal()
      # resolves it ahead of Central, so the release never blocks on a publish.
      - name: Build qml4j-core from source
        run: |
          QV=$(grep -oP 'qml4j-core:\K[0-9]+\.[0-9]+\.[0-9]+' android-shell/app/build.gradle.kts)
          echo "qml4j-core version: $QV"
          git clone --depth 1 --branch "v$QV" https://github.com/TIMER-err/qml4j.git "$RUNNER_TEMP/qml4j"
          # qml4j sets its release version from the tag only at publish time and never
          # commits it, so the tagged pom still carries the previous version. Pin it to
          # $QV before install, else this builds the wrong version and player-core can't
          # resolve $QV (this is what qml4j's own release workflow does).
          mvn -q -B versions:set -DnewVersion="$QV" -DgenerateBackupPoms=false -f "$RUNNER_TEMP/qml4j/pom.xml"
          mvn -q -B -N -Dpmd.skip=true -Dcheckstyle.skip=true install -f "$RUNNER_TEMP/qml4j/pom.xml"
          mvn -q -B -DskipTests -Dpmd.skip=true -Dcpd.skip=true -Dcheckstyle.skip=true install -f "$RUNNER_TEMP/qml4j/qml4j-core/pom.xml"

      # player-core now carries the host-drawn lyric classes (shared-lyric was
      # merged in), so installing it is enough for the gradle build to resolve.
      - name: Install player-core
        run: |
          mvn -q -B -N install
          mvn -q -B -DskipTests install -f player-core/pom.xml

      - name: Decode keystore
        env:
          QPLAYER_KEYSTORE_BASE64: ${{ secrets.QPLAYER_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$QPLAYER_KEYSTORE_BASE64" ]; then
            echo "$QPLAYER_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/qplayer.jks"
            echo "QPLAYER_KEYSTORE=$RUNNER_TEMP/qplayer.jks" >> "$GITHUB_ENV"
            echo "Keystore decoded; release will be signed."
          else
            echo "::warning::QPLAYER_KEYSTORE_BASE64 not set — release will be UNSIGNED."
          fi

      - name: Build release APK
        run: |
          chmod +x android-shell/gradlew
          cd android-shell && ./gradlew --no-daemon :app:assembleRelease

      - name: Stage APK
        run: |
          mkdir -p out
          dir=android-shell/app/build/outputs/apk/release
          apk="$dir/app-release.apk"
          [ -f "$apk" ] || apk="$dir/app-release-unsigned.apk"
          cp "$apk" "out/QPlayer-android.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: QPlayer-android
          path: out/*

      - name: Attach to release
        # github.ref is unreliable for release:published when the tag is auto-created
        # from the UI (lands as refs/heads/master instead of refs/tags/<tag>), so check
        # the event name and pass the release tag explicitly.
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}

  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          # native-image -J-Xmx per runner: ubuntu/windows-latest have 16GB,
          # macos-14 has 7GB. Keep ~3GB headroom for OS + Maven on the 16GB boxes
          # and ~2GB on the 7GB one.
          - os: ubuntu-latest
            name: linux-x64
            package: bash desktop-host/dist/package-linux.sh
            artifact: desktop-host/target/QPlayer-x86_64.AppImage
            xmx: 12g
          - os: windows-latest
            name: windows-x64
            package: powershell -ExecutionPolicy Bypass -File desktop-host/dist/package-windows.ps1
            artifact: desktop-host/target/QPlayer-windows-x64.zip
            xmx: 12g
          # Apple Silicon only: GitHub retired the free Intel (macos-13) runner and
          # native-image can't cross-compile, so an arm64 runner can't emit an Intel
          # binary. Intel Mac users build locally (desktop-host/dist/package-macos.sh).
          - os: macos-14            # apple silicon
            name: macos-arm64
            package: bash desktop-host/dist/package-macos.sh
            artifact: desktop-host/target/QPlayer.dmg
            xmx: 5g
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM 21
        uses: graalvm/setup-graalvm@v1
        with:
          # Oracle GraalVM (free under GFTC for prod). The Community distribution
          # resolves '21' to 21.0.2 here, which precedes the Windows AWT heap-walk
          # fixes (21.0.5+) that headful TrayIcon depends on. Oracle '21' tracks
          # the latest LTS patch (21.0.7+), matching the local agent run.
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      # Explicit Maven cache (per-OS — GitHub caches don't cross OS): the LWJGL +
      # Skija + dorkbox jars are large, and restore/save show up plainly in the log.
      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      # The AOT step (and the native binary) loads libskija.so, which links
      # libEGL/libGL/fontconfig. A clean ubuntu runner ships none of them, so
      # FontMgr.<clinit> dies with UnsatisfiedLinkError: libEGL.so.1. Windows /
      # macOS Skija use other backends and need nothing here.
      - name: Install native GL/EGL libs (Linux runner)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libgles2 libglu1-mesa libfontconfig1

      # Build the matching qml4j-core from source (like the android job) instead of
      # resolving it from Maven Central, so a freshly-tagged engine works the moment
      # qplayer bumps qml4j.version — no waiting on Central publish/propagation. The
      # version is read from the root pom property; shell:bash runs the same script on
      # the windows/macos runners (git-bash on Windows). qml4j's own deps still come
      # from Central, but those are long-published.
      - name: Build qml4j-core from source
        shell: bash
        run: |
          QV=$(mvn -q -N help:evaluate -Dexpression=qml4j.version -DforceStdout)
          echo "qml4j-core version: $QV"
          git clone --depth 1 --branch "v$QV" https://github.com/TIMER-err/qml4j.git "$RUNNER_TEMP/qml4j"
          # Pin the cloned engine's pom version to the tag (the tagged pom keeps the
          # previous version; qml4j only sets the release version at publish time).
          mvn -q -B versions:set -DnewVersion="$QV" -DgenerateBackupPoms=false -f "$RUNNER_TEMP/qml4j/pom.xml"
          mvn -q -B -N -Dpmd.skip=true -Dcheckstyle.skip=true install -f "$RUNNER_TEMP/qml4j/pom.xml"
          mvn -q -B -DskipTests -Dpmd.skip=true -Dcpd.skip=true -Dcheckstyle.skip=true install -f "$RUNNER_TEMP/qml4j/qml4j-core/pom.xml"

      - name: Install player-core to local Maven repo
        run: mvn -B -DskipTests -pl player-core -am install

      - name: Build native image
        # bash on every runner (git-bash on Windows): PowerShell splits the bare
        # -Dnative.xmx=12g arg into "-Dnative" + ".xmx=12g", which mvn reads as a
        # bogus lifecycle phase. setup-graalvm's JAVA_HOME/PATH apply to bash too.
        shell: bash
        run: mvn -B -DskipTests -Dnative.xmx=${{ matrix.xmx }} -pl desktop-host -Pnative package

      - name: Package
        run: ${{ matrix.package }}

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p out
          ext="${{ matrix.artifact }}"; ext="${ext##*.}"
          cp "${{ matrix.artifact }}" "out/QPlayer-${{ matrix.name }}.${ext}"

      # Windows: also build an Inno Setup installer over the packaged QPlayer/ folder
      # (Program Files install + Start-Menu/desktop shortcut + uninstaller), so users
      # get a single setup.exe instead of a folder of loose DLLs. The portable zip is
      # still attached alongside.
      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $ver = "${{ github.event.release.tag_name }}"
          if (-not $ver) { $ver = "${{ github.ref_name }}" }
          $ver = $ver -replace '^v',''
          if (-not $ver) { $ver = "0.0.0" }
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & "$iscc" /DAppVersion=$ver `
            /DSourceFolder="$PWD\desktop-host\target\QPlayer" `
            /DIconFile="$PWD\desktop-host\dist\app-icon.ico" `
            "desktop-host\dist\qplayer.iss"
          Copy-Item "desktop-host\dist\QPlayer-windows-x64-setup.exe" "out\"

      - uses: actions/upload-artifact@v4
        with:
          name: QPlayer-${{ matrix.name }}
          path: out/*

      - name: Attach to release
        # github.ref is unreliable for release:published when the tag is auto-created
        # from the UI (lands as refs/heads/master instead of refs/tags/<tag>), so check
        # the event name and pass the release tag explicitly.
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}

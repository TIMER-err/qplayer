name: Release

# One unified release pipeline. It builds, in parallel:
#   • android  — the signed release APK
#   • desktop  — the GraalVM native-image app on Linux / Windows / macOS
#                (intel + apple-silicon); native-image can't cross-compile, so
#                each platform builds on its own runner.
# Every job attaches its artifact(s) to the GitHub Release for the tag
# (action-gh-release creates the release on first upload and appends after).
#
# Triggers on BOTH ways of cutting a release, so either works:
#   • `git push` of a `v*` tag           → push event
#   • "Publish release" in the GitHub UI → release:published event
# (a UI-created release does not reliably emit a tag push event, so we need both).
# A manual `workflow_dispatch` run skips the release and uploads artifacts only.

on:
  push:
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch: {}

# Push-a-tag and publish-a-release can both fire for the same version; collapse
# them into one run per ref instead of building everything twice.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    env:
      QPLAYER_STORE_PASSWORD: ${{ secrets.QPLAYER_STORE_PASSWORD }}
      QPLAYER_KEY_ALIAS: ${{ secrets.QPLAYER_KEY_ALIAS }}
      QPLAYER_KEY_PASSWORD: ${{ secrets.QPLAYER_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - uses: gradle/actions/setup-gradle@v4

      # qml4j-core is normally pulled from Maven Central, but a freshly-tagged
      # engine may not be published yet (Central monthly publish quota). Build the
      # matching tag from source into the local Maven repo; gradle's mavenLocal()
      # resolves it ahead of Central, so the release never blocks on a publish.
      - name: Build qml4j-core from source
        run: |
          QV=$(grep -oP 'qml4j-core:\K[0-9]+\.[0-9]+\.[0-9]+' android-shell/app/build.gradle.kts)
          echo "qml4j-core version: $QV"
          git clone --depth 1 --branch "v$QV" https://github.com/TIMER-err/qml4j.git "$RUNNER_TEMP/qml4j"
          mvn -q -B -N -Dpmd.skip=true -Dcheckstyle.skip=true install -f "$RUNNER_TEMP/qml4j/pom.xml"
          mvn -q -B -DskipTests -Dpmd.skip=true -Dcpd.skip=true -Dcheckstyle.skip=true install -f "$RUNNER_TEMP/qml4j/qml4j-core/pom.xml"

      # player-core now carries the host-drawn lyric classes (shared-lyric was
      # merged in), so installing it is enough for the gradle build to resolve.
      - name: Install player-core
        run: |
          mvn -q -B -N install
          mvn -q -B -DskipTests install -f player-core/pom.xml

      - name: Decode keystore
        env:
          QPLAYER_KEYSTORE_BASE64: ${{ secrets.QPLAYER_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$QPLAYER_KEYSTORE_BASE64" ]; then
            echo "$QPLAYER_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/qplayer.jks"
            echo "QPLAYER_KEYSTORE=$RUNNER_TEMP/qplayer.jks" >> "$GITHUB_ENV"
            echo "Keystore decoded; release will be signed."
          else
            echo "::warning::QPLAYER_KEYSTORE_BASE64 not set — release will be UNSIGNED."
          fi

      - name: Build release APK
        run: |
          chmod +x android-shell/gradlew
          cd android-shell && ./gradlew --no-daemon :app:assembleRelease

      - name: Stage APK
        run: |
          mkdir -p out
          dir=android-shell/app/build/outputs/apk/release
          apk="$dir/app-release.apk"
          [ -f "$apk" ] || apk="$dir/app-release-unsigned.apk"
          cp "$apk" "out/QPlayer-android.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: QPlayer-android
          path: out/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*

  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
            package: bash desktop-host/dist/package-linux.sh
            artifact: desktop-host/target/QPlayer-x86_64.AppImage
          - os: windows-latest
            name: windows-x64
            package: powershell -ExecutionPolicy Bypass -File desktop-host/dist/package-windows.ps1
            artifact: desktop-host/target/QPlayer-windows-x64.zip
          - os: macos-13            # intel
            name: macos-x64
            package: bash desktop-host/dist/package-macos.sh
            artifact: desktop-host/target/QPlayer.dmg
          - os: macos-14            # apple silicon
            name: macos-arm64
            package: bash desktop-host/dist/package-macos.sh
            artifact: desktop-host/target/QPlayer.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'
          cache: 'maven'

      # The AOT step (and the native binary) loads libskija.so, which links
      # libEGL/libGL/fontconfig. A clean ubuntu runner ships none of them, so
      # FontMgr.<clinit> dies with UnsatisfiedLinkError: libEGL.so.1. Windows /
      # macOS Skija use other backends and need nothing here.
      - name: Install native GL/EGL libs (Linux runner)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libgles2 libglu1-mesa libfontconfig1

      - name: Install player-core to local Maven repo
        run: mvn -B -DskipTests -pl player-core -am install

      - name: Build native image
        run: mvn -B -DskipTests -pl desktop-host -Pnative package

      - name: Package
        run: ${{ matrix.package }}

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p out
          ext="${{ matrix.artifact }}"; ext="${ext##*.}"
          cp "${{ matrix.artifact }}" "out/QPlayer-${{ matrix.name }}.${ext}"

      - uses: actions/upload-artifact@v4
        with:
          name: QPlayer-${{ matrix.name }}
          path: out/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*

name: Build debug APK

# Manually triggered only — for testing on forks / CI without a signing keystore.
# Produces an auto-signed debug APK that can be installed directly.

on:
  workflow_dispatch:

permissions: {}

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - uses: gradle/actions/setup-gradle@v4

      # Build the matching qml4j-core tag from source into the local Maven repo so
      # the build doesn't depend on it being published to Central yet.
      - name: Build qml4j-core from source
        run: |
          QV=$(grep -oP 'qml4j-core:\K[0-9]+\.[0-9]+\.[0-9]+' android-shell/app/build.gradle.kts)
          echo "qml4j-core version: $QV"
          git clone --depth 1 --branch "v$QV" https://github.com/TIMER-err/qml4j.git "$RUNNER_TEMP/qml4j"
          mvn -B -N -Dpmd.skip=true -Dcheckstyle.skip=true install -f "$RUNNER_TEMP/qml4j/pom.xml"
          mvn -B -DskipTests -Dpmd.skip=true -Dcpd.skip=true -Dcheckstyle.skip=true install -f "$RUNNER_TEMP/qml4j/qml4j-core/pom.xml"

      - name: Install player-core
        run: |
          mvn -B -N install
          mvn -B -DskipTests install -f player-core/pom.xml

      - name: Build debug APK
        run: |
          chmod +x android-shell/gradlew
          cd android-shell && ./gradlew --no-daemon --stacktrace --info :app:assembleDebug 2>&1

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qplayer-debug-apk
          path: android-shell/app/build/outputs/apk/debug/app-debug.apk
